spring:
  application:
    name: tirupurconnect

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tirupurconnect}
    username: ${DB_USER:tirupurconnect}
    password: ${DB_PASS:tirupurconnect}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          min-idle: 5

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  address: 0.0.0.0
  compression:
    enabled: true
    mime-types: application/json,text/plain
    min-response-size: 1024

app:
  jwt:
    secret: ${JWT_SECRET:changeme-use-a-256-bit-secret-in-production-please}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}   # 24h

  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}
    username: ${ES_USER:elastic}
    password: ${ES_PASS:changeme}
    index-name: listings

  redis:
    streams:
      supplier-updated:   stream:supplier.profile.updated
      inquiry-created:    stream:inquiry.created
      vitality-updated:   stream:vitality.score.updated
      dead-letter:        stream:dead-letter
    idempotency-ttl-hours: 48

  whatsapp:
    provider: ${WA_PROVIDER:mock}           # mock | gupshup | twilio
    api-url: ${WA_API_URL:https://api.gupshup.io/sm/api/v1/msg}
    api-key: ${WA_API_KEY:changeme}
    source-number: ${WA_SOURCE:+919999999999}

  outbox:
    scheduler-delay-ms: 5000
    max-retry-attempts: 3

  vitality:
    window-days: 90
    scores:
      wa-response: 35
      inquiry-responded: 28
      catalogue-updated: 20
      phone-verified: 12
      app-login: 5
    thresholds:
      active: 65
      dormant: 35
      fading: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.tirupurconnect: DEBUG
    org.springframework.data.redis: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] [%X{tenantId}] %logger{36} - %msg%n"
